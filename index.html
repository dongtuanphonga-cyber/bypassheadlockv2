<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HEADLOCK VER2</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a12; color: #fff; }
        .page { display: none; padding: 20px; min-height: 100vh; }
        .page.active { display: block; }
        
        /* SPLASH SCREEN */
        #splashScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #0a0a12, #1a1a2e); }
        .logo-container { text-align: center; }
        .logo-placeholder img { width: 150px; height: 150px; border-radius: 30px; }
        .premium-text { font-size: 24px; font-weight: bold; color: #ffd700; margin-top: 10px; }
        .tap-text { margin-top: 50px; color: #888; animation: blink 1s infinite; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* LOGIN SCREEN */
        #loginScreen { background: linear-gradient(135deg, #0a0a12, #1a1a2e); padding: 40px 20px; }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h1 { font-size: 28px; color: #ffd700; }
        .login-logo-placeholder img { width: 100px; height: 100px; border-radius: 20px; margin: 10px 0; }
        .key-login-text { font-size: 14px; color: #888; letter-spacing: 4px; }
        .login-form { max-width: 350px; margin: 0 auto; }
        .key-input { width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid #333; background: #1a1a2e; color: #fff; font-size: 16px; outline: none; }
        .key-input:focus { border-color: #ffd700; }
        .login-btn { width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ffd700, #f0a500); color: #000; font-size: 18px; font-weight: bold; cursor: pointer; }
        .login-btn:active { transform: scale(0.97); }
        .contact-section { text-align: center; margin-top: 30px; }
        .contact-section h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .social-buttons { display: flex; justify-content: center; gap: 15px; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .social-btn img { width: 100%; height: 100%; object-fit: cover; }
        .footer-text { color: #555; font-size: 12px; margin-top: 15px; }
        #keyStatus { color: #4cffc6; font-size: 12px; margin-top: 8px; }
        
        /* MAIN SCREEN */
        #mainScreen { background: #0a0a12; padding: 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; }
        .back-btn { background: none; border: none; color: #888; font-size: 16px; cursor: pointer; }
        .header-title h1 { font-size: 20px; color: #ffd700; }
        .header-title p { font-size: 10px; color: #666; }
        .hamburger { display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .hamburger span { width: 25px; height: 2px; background: #fff; border-radius: 2px; }
        .main-logo { text-align: center; margin: 15px 0; }
        .main-logo img { width: 80px; height: 80px; border-radius: 20px; }
        .toggle-section { margin: 15px 0; }
        .toggle-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #14141f; border-radius: 12px; margin-bottom: 8px; }
        .toggle-label { display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .toggle-icon { font-size: 18px; }
        .toggle-switch { width: 44px; height: 24px; background: #333; border-radius: 12px; cursor: pointer; position: relative; transition: 0.3s; }
        .toggle-switch.active { background: #ffd700; }
        .toggle-slider { width: 18px; height: 18px; background: #fff; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: 0.3s; }
        .toggle-switch.active .toggle-slider { left: 23px; }
        .start-buttons { text-align: center; margin-top: 20px; }
        .start-buttons h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .button-group { display: flex; gap: 10px; justify-content: center; }
        .start-btn { padding: 12px 40px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .start-btn.on { background: #ffd700; color: #000; }
        .start-btn.off { background: #333; color: #888; }
        .start-btn.on.active { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        .start-btn.off.active { background: #555; color: #fff; }
        .import-section { background: #14141f; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .import-section h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
        .import-btn, .run-file-btn, .show-file-list-btn, .clear-file-list-btn { padding: 10px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; margin: 4px 0; width: 100%; }
        .import-btn { background: #2a2a3e; color: #fff; }
        .run-file-btn { background: #ffd700; color: #000; font-weight: bold; }
        .run-file-btn:disabled { opacity: 0.5; }
        .show-file-list-btn { background: #333; color: #fff; }
        .clear-file-list-btn { background: #662222; color: #fff; }
        .file-name { color: #888; font-size: 12px; padding: 5px 0; }
        
        /* TOAST */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 10px; border: 1px solid #333; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 999; }
        .toast.show { opacity: 1; }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; }
        .modal-overlay.show { display: flex; align-items: center; justify-content: center; }
        .modal-box { background: #1a1a2e; padding: 30px; border-radius: 20px; max-width: 300px; width: 90%; text-align: center; }
        .modal-box h3 { color: #ffd700; margin-bottom: 10px; }
        .modal-box button { padding: 10px 30px; border: none; border-radius: 10px; background: #ffd700; color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* FILE LIST MODAL */
        .file-list-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; padding: 40px 20px; overflow-y: auto; }
        .file-list-modal.show { display: block; }
        .file-list-modal h3 { color: #ffd700; text-align: center; margin-bottom: 20px; }
        .file-list-modal button { display: block; width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: #2a2a3e; color: #fff; text-align: left; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>

<!-- SPLASH -->
<div class="page active" id="splashScreen">
    <div class="logo-container">
        <div class="logo-placeholder">
            <img src="https://via.placeholder.com/150/ffd700/000?text=HEADLOCK" alt="Logo">
        </div>
        <div class="premium-text">PREMIUM</div>
    </div>
    <div class="tap-text">👆 Tap anywhere to continue</div>
</div>

<!-- LOGIN -->
<div class="page" id="loginScreen">
    <div class="login-header">
        <h1>HEADLOCK VER2</h1>
        <div class="login-logo">
            <div class="login-logo-placeholder">
                <img src="https://via.placeholder.com/100/ffd700/000?text=HL" alt="">
            </div>
        </div>
        <p class="key-login-text">🔑 KEY LOGIN</p>
    </div>
    <div class="login-form">
        <input type="text" class="key-input" id="keyInput" placeholder="Nhập key...">
        <div id="keyStatus"></div>
        <button class="login-btn" id="loginBtn">LOGIN</button>
    </div>
    <div class="contact-section">
        <h3>CONTACT</h3>
        <div class="social-buttons">
            <div class="social-btn" onclick="window.open('https://zalo.me/0396134792','_blank')"><img src="https://via.placeholder.com/50/0066ff/fff?text=Z" alt=""></div>
            <div class="social-btn" onclick="window.open('https://facebook.com','_blank')"><img src="https://via.placeholder.com/50/1877f2/fff?text=F" alt=""></div>
        </div>
        <p class="footer-text">by NgChiDuc</p>
    </div>
</div>

<!-- MAIN -->
<div class="page" id="mainScreen">
    <div class="header">
        <button class="back-btn" id="mainBackBtn">← Back</button>
        <div class="header-title">
            <h1>HEADLOCK VER2</h1>
            <p>BY NgChiDuc</p>
        </div>
        <div class="hamburger" id="hamburger">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="main-logo">
        <img src="https://via.placeholder.com/80/ffd700/000?text=HL" alt="">
    </div>
    <div class="toggle-section">
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">🎯</span><span>REG LOCK</span></div>
            <div class="toggle-switch" data-toggle="reg"><div class="toggle-slider"></div></div>
        </div>
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">🚀</span><span>OPTIMIZER DEVICE</span></div>
            <div class="toggle-switch" data-toggle="boot"><div class="toggle-slider"></div></div>
        </div>
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">💀</span><span>HEADLOCK V2</span></div>
            <div class="toggle-switch" data-toggle="headlock"><div class="toggle-slider"></div></div>
        </div>
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">⚙️</span><span>FIX RUNG</span></div>
            <div class="toggle-switch" data-toggle="fix"><div class="toggle-slider"></div></div>
        </div>
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">🧠</span><span>EXTRACTLY</span></div>
            <div class="toggle-switch" data-toggle="extract"><div class="toggle-slider"></div></div>
        </div>
        <div class="toggle-item">
            <div class="toggle-label"><span class="toggle-icon">🔥</span><span>BUFF MÀN</span></div>
            <div class="toggle-switch" data-toggle="buff"><div class="toggle-slider"></div></div>
        </div>
    </div>
    <div class="start-buttons">
        <div class="import-section">
            <h3>📂 IMPORT CONFIG</h3>
            <input type="file" id="fileInput" hidden>
            <button class="import-btn" id="selectFileBtn">Chọn File Từ Máy</button>
            <div class="file-name" id="fileName">Chưa chọn file</div>
            <button class="run-file-btn" id="runFileBtn" disabled>▶ RUN FILE</button>
            <button class="show-file-list-btn" id="showFileListBtn">📋 Danh sách file</button>
            <button class="clear-file-list-btn" id="clearFileListBtn">🗑 Xoá file đã lưu</button>
        </div>
        <h3>STARTING FILES</h3>
        <div class="button-group">
            <button class="start-btn on" id="onBtn">ON</button>
            <button class="start-btn off active" id="offBtn">OFF</button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FILE LIST MODAL -->
<div class="file-list-modal" id="fileListModal">
    <h3>📋 Danh sách file</h3>
    <div id="fileListContent"></div>
    <button onclick="document.getElementById('fileListModal').classList.remove('show')" style="margin-top:15px;padding:10px;background:#333;color:#fff;border:none;border-radius:8px;width:100%;">Đóng</button>
</div>

<!-- MODAL OVERLAY -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3>🔓 HEADLOCK V2</h3>
        <p style="margin:10px 0;color:#aaa;">Đã bật thành công!</p>
        <button id="modalCloseBtn">OK</button>
    </div>
</div>

<script>
// ==================== BYPASS KEY - LUÔN ĐÚNG ====================
const KEYS = {
    'day': ['KEY1','KEY2','KEY3','DAYVIP'],
    'threeday': ['VIP3D-001','VIP3D-002'],
    'vip': ['VIP-ELITE-001','VIP-ELITE-002'],
    'vv': ['CRIPERLEGEND-SETUP']
};

function checkKey(input) {
    input = input.trim();
    for (let tier in KEYS) {
        if (KEYS[tier].includes(input)) return tier;
    }
    // BYPASS: Bất kỳ key nào cũng được
    if (input.length >= 3) return 'day';
    return null;
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ==================== SPLASH ====================
document.getElementById('splashScreen').addEventListener('click', () => {
    const saved = localStorage.getItem('headlock_key');
    if (saved && checkKey(saved)) {
        showPage('mainScreen');
        showToast('✅ Chào mừng trở lại!');
    } else {
        showPage('loginScreen');
    }
});

// ==================== LOGIN ====================
document.getElementById('loginBtn').addEventListener('click', () => {
    const input = document.getElementById('keyInput');
    const key = input.value.trim();
    const status = document.getElementById('keyStatus');
    
    if (!key) {
        status.textContent = '❌ Vui lòng nhập key!';
        status.style.color = '#ff6b6b';
        return;
    }
    
    const tier = checkKey(key);
    if (tier) {
        localStorage.setItem('headlock_key', key);
        localStorage.setItem('headlock_tier', tier);
        status.textContent = '✅ Đăng nhập thành công!';
        status.style.color = '#4cffc6';
        showToast('✅ Đăng nhập thành công!');
        setTimeout(() => showPage('mainScreen'), 500);
    } else {
        status.textContent = '❌ Key không hợp lệ! (nhập ít nhất 3 ký tự)';
        status.style.color = '#ff6b6b';
    }
});

document.getElementById('keyInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
});

// ==================== BACK BUTTON ====================
document.getElementById('mainBackBtn').addEventListener('click', () => {
    if (confirm('Thoát sẽ cần nhập lại key!')) {
        localStorage.removeItem('headlock_key');
        showPage('splashScreen');
    }
});

// ==================== TOGGLES ====================
document.querySelectorAll('.toggle-switch').forEach(t => {
    t.addEventListener('click', function() {
        this.classList.toggle('active');
        const label = this.closest('.toggle-item').querySelector('.toggle-label span:last-child').textContent;
        const status = this.classList.contains('active') ? 'bật' : 'tắt';
        showToast(`${status} ${label}`);
    });
});

// ==================== ON / OFF ====================
document.getElementById('onBtn').addEventListener('click', function() {
    document.getElementById('offBtn').classList.remove('active');
    this.classList.add('active');
    document.getElementById('modalOverlay').classList.add('show');
    showToast('🔓 Đã bật HEADLOCK V2');
});

document.getElementById('offBtn').addEventListener('click', function() {
    document.getElementById('onBtn').classList.remove('active');
    this.classList.add('active');
    showToast('🔒 Đã tắt HEADLOCK V2');
});

document.getElementById('modalCloseBtn').addEventListener('click', () => {
    document.getElementById('modalOverlay').classList.remove('show');
});

document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
});

// ==================== FILE IMPORT ====================
let fileList = JSON.parse(localStorage.getItem('file_list') || '[]');
let selectedFile = null;

document.getElementById('selectFileBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
    selectedFile = this.files[0];
    if (selectedFile) {
        document.getElementById('fileName').textContent = '✔ ' + selectedFile.name;
        document.getElementById('runFileBtn').disabled = false;
        if (!fileList.includes(selectedFile.name)) {
            fileList.push(selectedFile.name);
            localStorage.setItem('file_list', JSON.stringify(fileList));
        }
        showToast('✅ Đã tải file!');
    }
});

document.getElementById('runFileBtn').addEventListener('click', function() {
    if (!selectedFile) return showToast('❌ Chưa chọn file!');
    showToast('⏳ Đang chạy ' + selectedFile.name + '...');
    setTimeout(() => showToast('✅ File chạy thành công!'), 1500);
});

document.getElementById('showFileListBtn').addEventListener('click', () => {
    const modal = document.getElementById('fileListModal');
    const content = document.getElementById('fileListContent');
    content.innerHTML = '';
    if (fileList.length === 0) {
        content.innerHTML = '<p style="color:#888;">Chưa có file nào</p>';
    } else {
        fileList.forEach(f => {
            const btn = document.createElement('button');
            btn.textContent = '📄 ' + f;
            btn.onclick = () => {
                selectedFile = { name: f };
                document.getElementById('fileName').textContent = '✔ ' + f;
                document.getElementById('runFileBtn').disabled = false;
                modal.classList.remove('show');
                showToast('✅ Chọn ' + f);
            };
            content.appendChild(btn);
        });
    }
    modal.classList.add('show');
});

document.getElementById('clearFileListBtn').addEventListener('click', () => {
    if (confirm('Xoá toàn bộ file đã lưu?')) {
        fileList = [];
        localStorage.removeItem('file_list');
        selectedFile = null;
        document.getElementById('fileName').textContent = 'Chưa chọn file';
        document.getElementById('runFileBtn').disabled = true;
        showToast('✅ Đã xoá!');
    }
});

// ==================== HAMBURGER ====================
document.getElementById('hamburger').addEventListener('click', () => {
    showToast('📱 Thông tin: Liên hệ Zalo 0396134792');
});

// ==================== TỰ ĐỘNG LOGIN ====================
window.onload = function() {
    const saved = localStorage.getItem('headlock_key');
    if (saved && checkKey(saved)) {
        // Giữ splash để người dùng tap
    }
};
</script>
</body>
</html>
